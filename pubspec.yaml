name: carminati_felinos
description: "App do Portal do Cliente - Carminati"
publish_to: 'none'

version: 1.0.5+28

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  intl: ^0.20.2
  cached_network_image: ^3.3.1
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.3.0
  google_fonts: ^6.2.1
  url_launcher: ^6.2.5
  font_awesome_flutter: ^10.7.0
  path_provider: ^2.1.2
  open_filex: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  adaptive_icon_background: "#8C1414"
  adaptive_icon_foreground: "assets/images/icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
